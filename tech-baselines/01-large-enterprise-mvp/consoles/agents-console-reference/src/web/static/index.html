<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1d1815">
<title>Agents — chat console</title>
<link rel="stylesheet" href="/static/style.css">
<link rel="stylesheet" href="/static/agents.css">
<style>
/* Standalone-page-specific overrides */
.ac-layout {
    display: grid;
    grid-template-areas: "topbar" "main";
    grid-template-columns: 1fr;
    grid-template-rows: auto minmax(0, 1fr);
    height: 100dvh;
    overflow: hidden;
}
.ac-topbar {
    grid-area: topbar;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 12px;
    background: var(--bg);
    min-height: 42px;
}
.ac-brand {
    color: var(--fg-accent);
    font-weight: 600;
}
.ac-back {
    color: var(--fg-muted);
    text-decoration: none;
    font-size: 13px;
}
.ac-back:hover { color: var(--fg-accent); }
.ac-spacer { flex: 1; }
.ac-main {
    grid-area: main;
    overflow-y: auto;
    padding: 24px;
}
.ac-content {
    max-width: 760px;
    margin: 0 auto;
}
.ac-content > h2 {
    color: var(--fg-accent);
    font-size: 16px;
    margin: 0 0 14px 0;
    border-bottom: 1px dashed var(--border);
    padding-bottom: 8px;
}
.ac-content #fleet-panel {
    /* Inherit the agents.css card styling but with slightly more breathing
     * room than the cramped sidebar version. */
    font-size: 13px;
}
.ac-content #fleet-panel .agent-card,
.ac-content #fleet-panel .run-card {
    padding: 6px 8px;
    margin: 4px 0;
    font-size: 13px;
}
.ac-empty {
    color: var(--fg-muted);
    font-size: 13px;
    margin-top: 12px;
}
@media all and (display-mode: standalone) {
    .ac-topbar { padding-top: max(env(safe-area-inset-top, 0px), 60px); }
    .ac-main { padding-bottom: max(env(safe-area-inset-bottom, 0px), 16px); }
}
</style>
</head>
<body>
<div class="ac-layout">
  <header class="ac-topbar">
    <a class="ac-back" href="{{CHAT_CONSOLE_URL}}">← chat</a>
    <span class="ac-brand">agents console</span>
    <span class="ac-spacer"></span>
    <button class="icon-btn" id="theme-toggle" title="Toggle theme">◐</button>
  </header>
  <main class="ac-main">
    <div class="ac-content">
      <div id="fleet-panel"><div class="ac-empty">loading…</div></div>
    </div>
  </main>
</div>

<script>
// Theme toggle — local copy since we don't load the chat console's app.js.
(() => {
    const LS = "console.theme";
    const btn = document.getElementById("theme-toggle");
    const apply = () => {
        document.documentElement.setAttribute(
            "data-theme", localStorage.getItem(LS) || "dark"
        );
    };
    btn.addEventListener("click", () => {
        const cur = localStorage.getItem(LS) || "dark";
        localStorage.setItem(LS, cur === "dark" ? "light" : "dark");
        apply();
    });
    apply();
})();
</script>
<script src="/static/agents.js"></script>
</body>
</html>
