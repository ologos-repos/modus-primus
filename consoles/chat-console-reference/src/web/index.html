<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1d1815">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="{{PERSONA_NAME}}">
<title>{{PERSONA_NAME}} · {{MODEL_NAME}}</title>
<link rel="manifest" href="/static/manifest.json">
<link rel="icon" type="image/png" href="/static/avatar.png">
<link rel="apple-touch-icon" href="/static/avatar.png">
<link rel="stylesheet" href="/static/style.css?v={{ASSET_VERSION}}">
</head>
<body>
<div class="layout">
  <header class="topbar">
    <button class="menu-btn" id="sidebar-toggle" aria-label="Toggle sidebar">≡</button>
    <span class="brand">{{PERSONA_NAME}}</span>
    <span class="brand-model muted" title="active model">{{MODEL_NAME}}</span>
    <span class="spacer"></span>
    <button class="icon-btn" id="notif-btn" aria-label="Enable notifications" title="Enable notifications" hidden>🔔</button>
    <button class="icon-btn" id="theme-toggle" aria-label="Toggle theme" title="Toggle theme">◐</button>
    <button class="icon-btn" id="new-session-btn" aria-label="New session" title="New session">+</button>
  </header>

  <aside class="sidebar" id="sidebar" aria-label="sidebar">
    <div class="sidebar-content sidebar-link-row">
      <a class="sidebar-link" href="{{AGENTS_CONSOLE_URL}}">
        Agents Console <span class="sidebar-link-arrow">→</span>
      </a>
    </div>
    <div class="sidebar-content" id="sessions-list">
      <div class="muted">loading sessions…</div>
    </div>
  </aside>

  <main class="main">
    <div class="conversation" id="conversation"></div>
  </main>

  <footer class="composer">
    <div class="meter" id="meter"><span class="muted">no session yet</span></div>
    <div class="attachments" id="attachments" hidden></div>
    <form class="composer-form" id="composer-form">
      <div class="composer-side">
        <button type="button" class="attach-btn" id="attach-btn" title="Attach file (or paste an image into the input)">+</button>
      </div>
      <!-- No `accept` filter — server stores anything; claude reads what
           it can (Office docs, images, PDFs, code, archives, etc.). -->
      <input type="file" id="attach-input" multiple hidden>
      <textarea id="prompt-input" rows="1" autofocus spellcheck="false"></textarea>
      <button type="submit" id="send-btn">send</button>
    </form>
  </footer>
</div>

<script src="/static/marked.min.js"></script>
<script src="/static/dompurify.min.js"></script>
<script src="/static/app.js?v={{ASSET_VERSION}}"></script>
</body>
</html>
